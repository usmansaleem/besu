name: nightly kurtosis interop

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      besu_image:
        description: 'Besu Docker image (default: hyperledger/besu:develop)'
        required: false
        type: string
      runner:
        description: 'Runner label (use ubuntu-latest when triggering from a fork)'
        required: false
        default: besu-research-ubuntu-8
        type: string

jobs:
  kurtosis-cl-interop:
    name: "Besu CL interop (Lighthouse + Prysm)"
    runs-on: ${{ github.event.inputs.runner || 'besu-research-ubuntu-8' }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Set Besu image
        run: |
          IMAGE="${{ github.event.inputs.besu_image }}"
          echo "BESU_IMAGE=${IMAGE:-docker.io/hyperledger/besu:develop}" >> "$GITHUB_ENV"

      - name: Write network params
        run: |
          cat > network_params.yaml <<EOF
          participants:
            - el_type: besu
              el_image: ${BESU_IMAGE}
              cl_type: lighthouse
            - el_type: besu
              el_image: ${BESU_IMAGE}
              cl_type: prysm
          network_params:
            preset: minimal
          additional_services:
            - assertoor
          assertoor_params:
            run_block_proposal_check: true
            run_transaction_test: true
          EOF

      - name: Run kurtosis interop test
        uses: ethpandaops/kurtosis-assertoor-github-action@f64942cbc780df731a731ea9f45765b161d2c8df # v1.0.1
        with:
          kurtosis_version: "1.18.3"
          ethereum_package_args: network_params.yaml
          enclave_dump: "true"
